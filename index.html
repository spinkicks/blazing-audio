<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1220" />
    <meta
      name="description"
      content="Blazing Audio. Learn how home audio actually works through short, hands-on, interactive lessons."
    />

    <!-- Warm up the backends the app hits right after boot (auth + Firestore) so
         DNS/TLS happen in parallel with bundle parsing instead of serially after
         it. This is the main prod-only latency that localhost never pays. -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />

    <!-- Fonts via <link> (was a render-blocking @import in CSS, which serialized
         the font fetch behind the stylesheet download). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap"
    />

    <title>Blazing Audio</title>

    <style>
      /* Boot splash: painted from static HTML before any JS downloads, so a cold
         network load never shows a long blank screen. It lives inside #root, so
         React replaces it automatically on first render (which shows the same
         loading mark) for a seamless handoff. */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1220;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash" aria-hidden="true">
        <svg viewBox="0 0 180 120" width="240" height="160" role="img" aria-label="Loading">
          <rect x="18" y="24" width="64" height="72" fill="#0f1828" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
          <rect x="26" y="32" width="48" height="12" fill="#070b14" stroke="rgba(255,255,255,0.1)" />
          <rect x="30" y="54" width="10" height="32" fill="rgba(100,116,139,0.7)" />
          <rect x="40" y="58" width="6" height="24" fill="rgba(56,189,248,0.8)" />
          <path d="M 46 58 L 78 46 L 78 94 L 46 82 Z" fill="rgba(14,165,233,0.25)" stroke="#38bdf8" stroke-width="3" />
          <rect x="30" y="88" width="10" height="3" fill="rgba(100,116,139,0.7)" />
          <rect x="58" y="88" width="10" height="3" fill="rgba(100,116,139,0.7)" />
          <path d="M 92 44 C 107 49.3, 107 70.7, 92 76" fill="none" stroke="#38bdf8" stroke-width="4">
            <animate attributeName="opacity" values="0.15;1;0.15" dur="1.2s" begin="0s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="0 0; 8 0; 0 0" dur="1.2s" begin="0s" repeatCount="indefinite" />
          </path>
          <path d="M 113 38 C 128 45.3, 128 74.7, 113 82" fill="none" stroke="#38bdf8" stroke-width="4">
            <animate attributeName="opacity" values="0.15;1;0.15" dur="1.2s" begin="0.18s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="0 0; 8 0; 0 0" dur="1.2s" begin="0.18s" repeatCount="indefinite" />
          </path>
          <path d="M 134 32 C 149 41.3, 149 78.7, 134 88" fill="none" stroke="#38bdf8" stroke-width="4">
            <animate attributeName="opacity" values="0.15;1;0.15" dur="1.2s" begin="0.36s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="0 0; 8 0; 0 0" dur="1.2s" begin="0.36s" repeatCount="indefinite" />
          </path>
          <rect x="18" y="101" width="120" height="2" fill="rgba(255,255,255,0.1)" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
